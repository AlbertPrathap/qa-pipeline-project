name: Level 3 - Maven Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java
        run: java -version

      - name: Simulate Build
        run: echo "Simulating mvn clean install"

      - name: Run Tests
        run: |
          echo "Running tests..."
          mkdir -p target/surefire-reports
          echo "Test Failed" > target/surefire-reports/result.txt
          exit 1

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/surefire-reports
